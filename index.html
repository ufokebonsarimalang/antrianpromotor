<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Antrian Walk-In Promotor</title>
  
  <!-- SweetAlert2 (Pop-up Modern) & Font Awesome -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
    body { background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 480px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
    .header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 20px; text-align: center; }
    .header h2 { font-size: 20px; margin-bottom: 5px; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
    .bg-buka { background-color: #2ecc71; color: white; }
    .bg-tutup { background-color: #e74c3c; color: white; }
    
    .content { padding: 20px; }
    .login-box, .app-box { display: none; }
    .active { display: block; }
    
    .form-group { margin-bottom: 15px; }
    label { font-size: 14px; color: #666; font-weight: 600; display: block; margin-bottom: 5px; }
    select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3498db; color: white; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
    button:active { transform: scale(0.98); }
    button.btn-success { background: #2ecc71; }
    button.btn-danger { background: #e74c3c; }
    
    .timer-card { background: #fff8e7; border: 1px solid #ffeaa7; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
    .timer-card h3 { font-size: 14px; color: #d63031; }
    .timer-display { font-size: 32px; font-weight: bold; color: #d63031; margin: 5px 0; }
    
    .queue-list { list-style: none; margin-top: 15px; }
    .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #3498db; }
    .queue-item.active-item { border-left-color: #2ecc71; background: #e8f8f5; }
    .queue-item .nama { font-weight: bold; color: #333; }
    .queue-item .status { font-size: 12px; padding: 3px 8px; border-radius: 4px; background: #eee; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>ANTRIAN PROMOTOR</h2>
    <span id="systemStatusBadge" class="status-badge bg-buka">MEMUAT...</span>
  </div>

  <div class="content">
    <!-- SECTION LOGIN PROMOTOR -->
    <div id="loginBox" class="login-box active">
      <div class="form-group">
        <label>PILIH NAMA PROMOTOR:</label>
        <select id="selectSales">
          <option value="">-- Memuat Data --</option>
        </select>
      </div>
      <button onclick="loginPromotor()"><i class="fa-solid fa-right-to-bracket"></i> Masuk Aplikasi</button>
    </div>

    <!-- SECTION UTAMA APLIKASI -->
    <div id="appBox" class="app-box">
      <p style="margin-bottom: 15px;">Halo, <b id="userSalesName" style="color:#3498db;">-</b>!</p>
      
      <!-- MONITOR TIMER STANDBY -->
      <div class="timer-card">
        <h3>SISA WAKTU STANDBY URUTAN 1</h3>
        <div id="timerDisplay" class="timer-display">00:00</div>
        <small id="timerInfo">Promotor di urutan 1 wajib siap melayani</small>
      </div>

      <!-- AKSI UTAMA PROMOTOR -->
      <button onclick="aksiDaftar()" class="btn-success"><i class="fa-solid fa-user-plus"></i> Masuk Antrian Baru</button>
      <button onclick="aksiAmbil()" style="background:#f39c12; margin-top:100px;"><i class="fa-solid fa-handshake"></i> Bawa Customer (Urutan Saya)</button>
      <button onclick="aksiSelesai()" class="btn-danger"><i class="fa-solid fa-circle-check"></i> Selesai Melayani Customer</button>

      <!-- DAFTAR ANTRIAN AKTIF -->
      <h3 style="margin-top: 25px; font-size: 16px; color: #444;">Daftar Antrian Saat Ini:</h3>
      <ul id="queueList" class="queue-list">
        <!-- List Antrian Diisi Otomatis via JS -->
      </ul>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // PASTE URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI!
  // ==========================================
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRAVavq87AMEX40cM3-3SsIMP89CeW6kJT_MSpxxILasQ4gohb_sMKtG50zt8kpyye/exec"; 
  
  let currentPromotor = "";
  let sudahPeringatan1Menit = false;

  // Inisialisasi Aplikasi saat Pertama Buka
  window.onload = function() {
    loadMasterSales();
    setInterval(fetchAntrian, 3000); // Auto refresh antrian tiap 3 detik
  };

  // 1. Ambil Daftar Sales dari Apps Script
  function loadMasterSales() {
    fetch(`${SCRIPT_URL}?aksi=getMasterSales`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "sukses") {
          let html = '<option value="">-- Pilih Nama Anda --</option>';
          data.data.forEach(nama => {
            html += `<option value="${nama}">${nama}</option>`;
          });
          document.getElementById('selectSales').innerHTML = html;
        }
      });
  }

  // 2. Process Login Promotor
  function loginPromotor() {
    const val = document.getElementById('selectSales').value;
    if(!val) return Swal.fire('Perhatian', 'Pilih nama promotor terlebih dahulu!', 'warning');
    
    currentPromotor = val;
    document.getElementById('userSalesName').innerText = currentPromotor;
    document.getElementById('loginBox').classList.remove('active');
    document.getElementById('appBox').classList.add('active');
    fetchAntrian();
  }

  // 3. Main Function Get Antrian + Cek Sisa Detik & Trigger Pop-up
  function fetchAntrian() {
    fetch(`${SCRIPT_URL}?aksi=getAntrian`)
      .then(res => res.json())
      .then(res => {
        if(res.status === "sukses") {
          // A. Update Badge Status Sistem (BUKA/TUTUP)
          const badge = document.getElementById('systemStatusBadge');
          if(res.statusAntrian === "TUTUP") {
            badge.innerText = "SISTEM DITUTUP";
            badge.className = "status-badge bg-tutup";
          } else {
            badge.innerText = "SISTEM DIBUKA";
            badge.className = "status-badge bg-buka";
          }

          // B. Update List UI Antrian
          let listHtml = "";
          if(res.data.length === 0) {
            listHtml = '<li class="queue-item"><span class="nama">Belum ada antrian</span></li>';
          } else {
            res.data.forEach((item, index) => {
              const isActive = index === 0 ? "active-item" : "";
              listHtml += `
                <li class="queue-item ${isActive}">
                  <span class="nama">${index + 1}. ${item.nama}</span>
                  <span class="status">${item.status}</span>
                </li>
              `;
            });
          }
          document.getElementById('queueList').innerHTML = listHtml;

          // C. Update Display Timer Detik
          if(res.sisaDetik !== null && res.data.length > 0) {
            updateTimerDisplay(res.sisaDetik);
            
            // D. LOGIKA PERINGATAN POPUP MODERN & GETAR HP (1 MENIT TERAKHIR)
            prosesCekPeringatanStandby(res, currentPromotor);
          } else {
            document.getElementById('timerDisplay').innerText = "00:00";
          }
        }
      });
  }

  // Helper Format Detik ke MM:SS
  function updateTimerDisplay(totalDetik) {
    let m = Math.floor(totalDetik / 60);
    let s = totalDetik % 60;
    m = m < 10 ? "0" + m : m;
    s = s < 10 ? "0" + s : s;
    document.getElementById('timerDisplay').innerText = `${m}:${s}`;
  }

  // LOGIKA PERINGATAN MODERNNYA DI SINI
  function prosesCekPeringatanStandby(response, namaPromotorLogin) {
    if (response.data && response.data.length > 0) {
      let promotorUrutan1 = response.data[0].nama;
      let sisaDetik = response.sisaDetik;

      // Hanya jalankan jika Promotor yang sedang login berada di Urutan 1
      if (promotorUrutan1 === namaPromotorLogin) {
        
        // Peringatan terpicu jika waktu <= 60 detik (1 menit)
        if (sisaDetik !== null && sisaDetik <= 60 && sisaDetik > 0 && !sudahPeringatan1Menit) {
          sudahPeringatan1Menit = true; // Kunci agar popup tidak spam

          // 1. EFEK GETAR HP
          if ("vibrate" in navigator) {
            navigator.vibrate([500, 200, 500, 200, 500]);
          }

          // 2. POP-UP MODERN DENGAN SWEETALERT2
          Swal.fire({
            icon: 'warning',
            title: 'WAKTU HAMPIR HABIS!',
            html: `
              <div style="font-size: 15px; color: #444; line-height: 1.5;">
                Waktu standby Anda tersisa <b>kurang dari 1 menit</b>.<br><br>
                <span style="background-color: #fff3cd; color: #856404; padding: 6px 12px; border-radius: 6px; font-weight: bold; display: inline-block;">
                  Silakan hubungi SPV untuk memperpanjang timer!
                </span>
              </div>
            `,
            confirmButtonText: 'Saya Mengerti',
            confirmButtonColor: '#e67e22',
            allowOutsideClick: false,
            borderRadius: '16px'
          });
        }

        // Reset penanda jika SPV sudah menambah timer (sisa detik kembali > 60)
        if (sisaDetik > 60) {
          sudahPeringatan1Menit = false;
        }
      }
    }
  }

  // Aksi Tombol-tombol
  function aksiDaftar() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=daftarAntri&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => {
        Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error');
        fetchAntrian();
      });
  }

  function aksiAmbil() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=ambilAntrian&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => {
        Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error');
        fetchAntrian();
      });
  }

  function aksiSelesai() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=selesaiMelayani&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => {
        Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error');
        fetchAntrian();
      });
  }
</script>

</body>
</html>
