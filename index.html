<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Antrian Walk-In Promotor & SPV</title>
  
  <!-- SweetAlert2 (Pop-up Modern) & Font Awesome -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
    body { background-color: #f4f7f6; padding: 15px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 20px; }
    
    .header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 20px; text-align: center; position: relative; }
    .header h2 { font-size: 18px; margin-bottom: 5px; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
    .bg-buka { background-color: #2ecc71; color: white; }
    .bg-tutup { background-color: #e74c3c; color: white; }
    
    .nav-tabs { display: flex; background: #eee; border-bottom: 1px solid #ddd; }
    .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; cursor: pointer; color: #666; border: none; background: none; }
    .tab-btn.active { background: white; color: #3498db; border-bottom: 3px solid #3498db; }

    .content { padding: 20px; }
    .section { display: none; }
    .section.active { display: block; }
    
    .form-group { margin-bottom: 15px; }
    label { font-size: 13px; color: #555; font-weight: 600; display: block; margin-bottom: 5px; }
    select, input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
    
    button { width: 100%; padding: 11px; border: none; border-radius: 8px; background: #3498db; color: white; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
    button:active { transform: scale(0.98); }
    .btn-success { background: #2ecc71; }
    .btn-warning { background: #f39c12; }
    .btn-danger { background: #e74c3c; }
    .btn-dark { background: #34495e; }
    
    .timer-card { background: #fff8e7; border: 1px solid #ffeaa7; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
    .timer-card h3 { font-size: 12px; color: #d63031; }
    .timer-display { font-size: 28px; font-weight: bold; color: #d63031; margin: 3px 0; }
    
    .queue-list { list-style: none; margin-top: 15px; }
    .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #3498db; }
    .queue-item.active-item { border-left-color: #2ecc71; background: #e8f8f5; }
    .queue-item .nama { font-weight: bold; color: #333; font-size: 14px; }
    .queue-item .status { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #eee; }

    .spv-card { background: #f1f2f6; border: 1px solid #e1e2e6; border-radius: 10px; padding: 12px; margin-bottom: 15px; }
    .spv-card h4 { font-size: 13px; color: #2c3e50; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>ANTRIAN WALK-IN</h2>
    <span id="systemStatusBadge" class="status-badge bg-buka">MEMUAT...</span>
  </div>

  <!-- NAVIGATION TABS -->
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('promotor')"><i class="fa-solid fa-user"></i> PROMOTOR</button>
    <button class="tab-btn" onclick="switchTab('spv')"><i class="fa-solid fa-user-gear"></i> KONTROL SPV</button>
  </div>

  <div class="content">
    
    <!-- ================= 1. TAB PROMOTOR ================= -->
    <div id="tabPromotor" class="section active">
      <!-- Form Login Sales -->
      <div id="promotorLoginBox">
        <div class="form-group">
          <label>PILIH NAMA PROMOTOR:</label>
          <select id="selectSales">
            <option value="">-- Memuat Data --</option>
          </select>
        </div>
        <button onclick="loginPromotor()"><i class="fa-solid fa-right-to-bracket"></i> Masuk Aplikasi</button>
      </div>

      <!-- Content Promotor Aktif -->
      <div id="promotorAppBox" style="display: none;">
        <p style="margin-bottom: 12px; font-size:14px;">Promotor Login: <b id="userSalesName" style="color:#3498db;">-</b></p>
        
        <!-- TIMER STANDBY -->
        <div class="timer-card">
          <h3>SISA WAKTU STANDBY URUTAN 1</h3>
          <div id="timerDisplay" class="timer-display">00:00</div>
        </div>

        <!-- Tombol Aksi Promotor -->
        <button onclick="aksiDaftar()" class="btn-success"><i class="fa-solid fa-user-plus"></i> Masuk Antrian Baru</button>
        <button onclick="aksiAmbil()" class="btn-warning"><i class="fa-solid fa-handshake"></i> Bawa Customer (Urutan Saya)</button>
        <button onclick="aksiSelesai()" class="btn-danger"><i class="fa-solid fa-circle-check"></i> Selesai Melayani Customer</button>
      </div>

      <!-- LIST ANTRIAN UNTUK PROMOTOR -->
      <h4 style="margin-top: 20px; font-size: 14px; color: #444;">Daftar Antrian Aktif:</h4>
      <ul id="queueListPromotor" class="queue-list"></ul>
    </div>

    <!-- ================= 2. TAB KONTROL SPV ================= -->
    <div id="tabSPV" class="section">
      
      <!-- Form Input PIN SPV -->
      <div id="spvPinBox" class="spv-card">
        <h4>LOGIN SUPERVISOR</h4>
        <div class="form-group">
          <label>MASUKKAN PIN SPV:</label>
          <input type="password" id="inputPinSPV" placeholder="Masukkan PIN SPV">
        </div>
        <button onclick="loginSPV()" class="btn-dark"><i class="fa-solid fa-lock"></i> Verifikasi PIN</button>
      </div>

      <!-- Panel Fitur Lengkap SPV -->
      <div id="spvPanelBox" style="display: none;">
        
        <!-- A. Buka / Tutup Sistem -->
        <div class="spv-card">
          <h4>1. KONTROL SISTEM ANTRIAN</h4>
          <div style="display: flex; gap: 8px;">
            <button onclick="spvSetStatus('BUKA')" class="btn-success"><i class="fa-solid fa-door-open"></i> Buka Antrian</button>
            <button onclick="spvSetStatus('TUTUP')" class="btn-danger"><i class="fa-solid fa-door-closed"></i> Tutup Antrian</button>
          </div>
        </div>

        <!-- B. Manajemen Timer & Urutan -->
        <div class="spv-card">
          <h4>2. MANAJEMEN TIMER & KEMAJUAN ANTRIAN</h4>
          <button onclick="spvTambahTimer()" class="btn-warning"><i class="fa-solid fa-clock-rotate-left"></i> Refresh/Tambah Timer Standby (Urutan 1)</button>
        </div>

        <!-- C. Aksi Antrian Manual untuk Promotor -->
        <div class="spv-card">
          <h4>3. KONTROL PROMOTOR MANUAL</h4>
          <div class="form-group">
            <label>Pilih Nama Promotor Target:</label>
            <select id="spvSelectSalesTarget">
              <option value="">-- Pilih Promotor --</option>
            </select>
          </div>
          <button onclick="spvAmbilBebas()" class="btn-dark" style="margin-bottom:6px;"><i class="fa-solid fa-angles-up"></i> Majukan Jadi 'Membawa Customer'</button>
          <button onclick="spvDaftarAntri()" class="btn-success" style="margin-bottom:6px;"><i class="fa-solid fa-plus"></i> Masukkan ke Antrian (Paling Bawah)</button>
          <button onclick="spvKeluarkanAntrian()" class="btn-danger"><i class="fa-solid fa-trash"></i> Keluarkan dari Antrian</button>
        </div>

        <!-- D. Reset Device ID -->
        <div class="spv-card">
          <h4>4. RESET DEVICE BINDING (HP)</h4>
          <button onclick="spvResetDevice()" class="btn-danger"><i class="fa-solid fa-mobile-screen-button"></i> Reset Kunci Perangkat Sales Target</button>
        </div>

      </div>

      <!-- LIST ANTRIAN UNTUK SPV -->
      <h4 style="margin-top: 15px; font-size: 14px; color: #444;">Monitoring Antrian (SPV):</h4>
      <ul id="queueListSPV" class="queue-list"></ul>
    </div>

  </div>
</div>

<script>
  // ==========================================
  // PASTE URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI!
  // ==========================================
  const SCRIPT_URL = "GANTI_DENGAN_URL_DEPLOY_APPS_SCRIPT_ANDA"; 
  
  let currentPromotor = "";
  let authenticatedSPVPin = "";
  let sudahPeringatan1Menit = false;

  window.onload = function() {
    loadMasterSales();
    setInterval(fetchAntrian, 3000); // Refresh data tiap 3 detik
  };

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    
    if(tab === 'promotor') {
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.getElementById('tabPromotor').classList.add('active');
    } else {
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
      document.getElementById('tabSPV').classList.add('active');
    }
  }

  // Fetch Master Sales
  function loadMasterSales() {
    fetch(`${SCRIPT_URL}?aksi=getMasterSales`)
      .then(res => res.json())
      .then(data => {
        if(data.status === "sukses") {
          let html = '<option value="">-- Pilih Nama --</option>';
          data.data.forEach(nama => { html += `<option value="${nama}">${nama}</option>`; });
          document.getElementById('selectSales').innerHTML = html;
          document.getElementById('spvSelectSalesTarget').innerHTML = html;
        }
      });
  }

  // Login Promotor
  function loginPromotor() {
    const val = document.getElementById('selectSales').value;
    if(!val) return Swal.fire('Perhatian', 'Pilih nama promotor terlebih dahulu!', 'warning');
    
    currentPromotor = val;
    document.getElementById('userSalesName').innerText = currentPromotor;
    document.getElementById('promotorLoginBox').style.display = 'none';
    document.getElementById('promotorAppBox').style.display = 'block';
    fetchAntrian();
  }

  // Fetch Antrian Sistem & Timer
  function fetchAntrian() {
    fetch(`${SCRIPT_URL}?aksi=getAntrian`)
      .then(res => res.json())
      .then(res => {
        if(res.status === "sukses") {
          // Status Badge Sistem
          const badge = document.getElementById('systemStatusBadge');
          if(res.statusAntrian === "TUTUP") {
            badge.innerText = "SISTEM DITUTUP";
            badge.className = "status-badge bg-tutup";
          } else {
            badge.innerText = "SISTEM DIBUKA";
            badge.className = "status-badge bg-buka";
          }

          // List UI Antrian
          let listHtml = "";
          if(res.data.length === 0) {
            listHtml = '<li class="queue-item"><span class="nama">Belum ada antrian</span></li>';
          } else {
            res.data.forEach((item, index) => {
              const isActive = index === 0 ? "active-item" : "";
              listHtml += `
                <li class="queue-item ${isActive}">
                  <span class="nama">${index + 1}. ${item.nama}</span>
                  <span class="status">${item.status}</span>
                </li>
              `;
            });
          }
          document.getElementById('queueListPromotor').innerHTML = listHtml;
          document.getElementById('queueListSPV').innerHTML = listHtml;

          // Timer Display & Warning Popup
          if(res.sisaDetik !== null && res.data.length > 0) {
            updateTimerDisplay(res.sisaDetik);
            prosesCekPeringatanStandby(res, currentPromotor);
          } else {
            document.getElementById('timerDisplay').innerText = "00:00";
          }
        }
      });
  }

  function updateTimerDisplay(totalDetik) {
    let m = Math.floor(totalDetik / 60);
    let s = totalDetik % 60;
    m = m < 10 ? "0" + m : m;
    s = s < 10 ? "0" + s : s;
    document.getElementById('timerDisplay').innerText = `${m}:${s}`;
  }

  // POPUP MODERN & GETAR (PROMOTOR URUTAN 1)
  function prosesCekPeringatanStandby(response, namaPromotorLogin) {
    if (response.data && response.data.length > 0) {
      let promotorUrutan1 = response.data[0].nama;
      let sisaDetik = response.sisaDetik;

      if (promotorUrutan1 === namaPromotorLogin) {
        if (sisaDetik !== null && sisaDetik <= 60 && sisaDetik > 0 && !sudahPeringatan1Menit) {
          sudahPeringatan1Menit = true;

          if ("vibrate" in navigator) {
            navigator.vibrate([500, 200, 500, 200, 500]);
          }

          Swal.fire({
            icon: 'warning',
            title: 'WAKTU HAMPIR HABIS!',
            html: `
              <div style="font-size: 14px; color: #444;">
                Waktu standby Anda tersisa <b>kurang dari 1 menit</b>.<br><br>
                <span style="background-color: #fff3cd; color: #856404; padding: 6px 12px; border-radius: 6px; font-weight: bold; display: inline-block;">
                  Silakan hubungi SPV untuk memperpanjang timer!
                </span>
              </div>
            `,
            confirmButtonText: 'Saya Mengerti',
            confirmButtonColor: '#e67e22',
            allowOutsideClick: false
          });
        }

        if (sisaDetik > 60) {
          sudahPeringatan1Menit = false;
        }
      }
    }
  }

  // Aksi-aksi Promotor
  function aksiDaftar() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=daftarAntri&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function aksiAmbil() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=ambilAntrian&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function aksiSelesai() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=selesaiMelayani&namaSales=${encodeURIComponent(currentPromotor)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  // ================= AKSI KONTROL SPV =================
  function loginSPV() {
    const pin = document.getElementById('inputPinSPV').value;
    if(!pin) return Swal.fire('Perhatian', 'Masukkan PIN SPV!', 'warning');
    
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=loginSPV&pin=${encodeURIComponent(pin)}`)
      .then(res => res.json())
      .then(res => {
        if(res.status === 'sukses') {
          authenticatedSPVPin = pin;
          document.getElementById('spvPinBox').style.display = 'none';
          document.getElementById('spvPanelBox').style.display = 'block';
          Swal.fire('Login Berhasil', 'Akses SPV Aktif', 'success');
        } else {
          Swal.fire('Gagal', res.pesan, 'error');
        }
      });
  }

  function spvSetStatus(statusBaru) {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvSetStatusAntrian&pin=${encodeURIComponent(authenticatedSPVPin)}&statusBaru=${statusBaru}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function spvTambahTimer() {
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvTambahTimer&pin=${encodeURIComponent(authenticatedSPVPin)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function spvAmbilBebas() {
    const target = document.getElementById('spvSelectSalesTarget').value;
    if(!target) return Swal.fire('Perhatian', 'Pilih nama promotor target!', 'warning');
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvAmbilAntrianBebas&pin=${encodeURIComponent(authenticatedSPVPin)}&namaSales=${encodeURIComponent(target)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function spvDaftarAntri() {
    const target = document.getElementById('spvSelectSalesTarget').value;
    if(!target) return Swal.fire('Perhatian', 'Pilih nama promotor target!', 'warning');
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvDaftarAntri&pin=${encodeURIComponent(authenticatedSPVPin)}&namaSales=${encodeURIComponent(target)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function spvKeluarkanAntrian() {
    const target = document.getElementById('spvSelectSalesTarget').value;
    if(!target) return Swal.fire('Perhatian', 'Pilih nama promotor target!', 'warning');
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvKeluarkanAntrian&pin=${encodeURIComponent(authenticatedSPVPin)}&namaSales=${encodeURIComponent(target)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); fetchAntrian(); });
  }

  function spvResetDevice() {
    const target = document.getElementById('spvSelectSalesTarget').value;
    if(!target) return Swal.fire('Perhatian', 'Pilih nama promotor target!', 'warning');
    Swal.showLoading();
    fetch(`${SCRIPT_URL}?aksi=spvResetDevice&pin=${encodeURIComponent(authenticatedSPVPin)}&namaSales=${encodeURIComponent(target)}`)
      .then(res => res.json())
      .then(res => { Swal.fire(res.status === 'sukses' ? 'Berhasil' : 'Gagal', res.pesan, res.status === 'sukses' ? 'success' : 'error'); });
  }
</script>

</body>
</html>
