<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrian Walk-In Sales - UFO Kebonsari</title>
    <!-- Menghilangkan Peringatan Favicon 404 -->
    <link rel="shortcut icon" href="#">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        *, body, button, select, input {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; padding: 16px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 480px;
            background: var(--card-bg);
            border-radius: 20px; padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            text-align: center;
        }

        .gradient-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border-radius: 16px; padding: 20px; color: white; margin-bottom: 16px;
        }
        .gradient-header h2 { margin: 0; font-size: 20px; font-weight: 800; }
        .gradient-header p { margin: 4px 0 0 0; opacity: 0.85; font-size: 12px; }

        .status-badge-sistem {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px;
        }
        .status-open { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
        .status-closed { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

        .card-giliran-utama {
            background: #eff6ff; border: 1px solid #bfdbfe;
            border-radius: 14px; padding: 16px; margin-bottom: 16px;
        }
        .label-giliran { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--primary); }
        .nama-giliran-aktif { font-size: 26px; font-weight: 800; color: #1e3a8a; margin: 4px 0; }
        .timer-mundur { font-size: 13px; font-weight: 800; color: var(--danger); margin-top: 4px; display: block; }

        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }

        select, input[type="text"] { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: #ffffff; font-size: 13px; color: var(--text-main); outline: none;
        }

        button { 
            width: 100%; padding: 12px; border-radius: 10px; 
            font-size: 12px; font-weight: 700; cursor: pointer; border: none;
            text-transform: uppercase; transition: all 0.2s ease;
            display: inline-flex; justify-content: center; align-items: center; gap: 8px;
        }
        button:active { transform: scale(0.98); }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-cancel { background: #e2e8f0; color: var(--text-main); }
        .btn-disabled { background: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed !important; }

        /* SPINNER STYLING */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-badge {
            background: #f8fafc; border: 1px solid var(--border); border-radius: 12px;
            padding: 12px; margin-bottom: 16px; text-align: left; font-size: 12px;
        }

        .list-antrian { list-style: none; padding: 0; margin: 10px 0 0 0; text-align: left; }
        .list-antrian li {
            padding: 10px 12px; background: #ffffff; border-radius: 8px; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); font-size: 13px;
        }

        .badge-status-item {
            font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 6px;
        }
        .badge-standby { background: #dbeafe; color: #1e40af; }
        .badge-melayani { background: #fef3c7; color: #92400e; }

        .spv-link-btn {
            margin-top: 20px; background: #faf5ff; border: 1px solid #e9d5ff; color: #7c3aed;
            font-size: 11px; padding: 10px; border-radius: 10px; text-decoration: none; display: block; font-weight: 700;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.2s; padding: 16px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; width: 100%; max-width: 320px; padding: 20px; border-radius: 16px; text-align: center; }
        .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
        .modal-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions button { flex: 1; padding: 10px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="gradient-header">
            <h2>Antrian Walk-In Sales</h2>
            <p>UFO Kebonsari</p>
        </div>

        <div id="badge-status-sistem" class="status-badge-sistem status-open">
            STATUS ANTRIAN: OPEN
        </div>

        <div class="card-giliran-utama">
            <div class="label-giliran">Giliran Melayani Saat Ini</div>
            <div id="nama-aktif" class="nama-giliran-aktif">Memuat...</div>
            <span id="label-timer-mundur" class="timer-mundur" style="display: none;">Waktu tersisa: --:--</span>
        </div>

        <!-- LOGIN / KUNCI HP -->
        <div id="panel-login" style="display: none;">
            <div class="input-group">
                <label>Pilih Nama Anda (Kunci Perangkat)</label>
                <select id="pilih-sales"><option value="">-- Memuat Data --</option></select>
            </div>
            <button type="button" class="btn-primary" onclick="simpanAkunHP()">Simpan & Kunci di HP Ini</button>
        </div>

        <!-- MENU PROMOTOR -->
        <div id="panel-menu-utama" style="display: none;">
            <div class="user-badge">
                <span>Akun HP Ini:</span> <strong id="label-user-aktif" style="color:var(--primary-dark);">-</strong>
            </div>

            <button type="button" id="btn-utama-antri" class="btn-success" onclick="aksiUtamaAntri()">Masuk Shift / Ikut Antri</button>
            <button type="button" id="btn-utama-customer" class="btn-primary" onclick="aksiUtamaCustomer()" style="display: none; margin-top: 10px;">Sudah Membawa Customer</button>
        </div>

        <!-- LIVE LIST -->
        <div style="margin-top: 20px; text-align: left;">
            <span style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Live Urutan Antrian</span>
            <ul id="item-antrian-list" class="list-antrian">
                <li><span>Memuat data...</span></li>
            </ul>
        </div>

        <a href="spv.html" class="spv-link-btn">🔑 BUKA HALAMAN SPV</a>
    </div>

    <!-- MODAL -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-title" class="modal-title">Pemberitahuan</div>
            <div id="modal-desc" class="modal-desc">Isi pesan...</div>
            <div id="modal-actions" class="modal-actions">
                <button type="button" class="btn-primary" onclick="tutupModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRAVavq87AMEX40cM3-3SsIMP89CeW6kJT_MSpxxILasQ4gohb_sMKtG50zt8kpyye/exec";

        let waktuTerakhirStandbyGlobal = null;
        let daftarAntrianGlobal = [];
        let masterSalesGlobal = [];
        let statusSayaGlobal = "belum_ada"; 
        let statusSistemGlobal = "BUKA";
        let namaSalesAktifGlobal = "";
        const BATAS_MENIT = 10;
        var sudahPeringatan1Menit = false;

        window.onload = function() {
            cekAkunKeServer();
            muatMasterSales();
            setInterval(muatDataAntrian, 3000); 
            setInterval(hitungMundurLokal, 1000); 
        };

        function getDeviceId() {
            let devId = localStorage.getItem('ufo_device_perm_id');
            if (!devId) {
                devId = 'DEV-' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                localStorage.setItem('ufo_device_perm_id', devId);
            }
            return devId;
        }

        function cekAkunKeServer() {
            const deviceId = getDeviceId();
            
            fetch(`${SCRIPT_URL}?aksi=cekBinding&deviceId=${encodeURIComponent(deviceId)}`, {
                method: 'GET',
                redirect: 'follow'
            })
            .then(res => res.json())
            .then(res => {
                if (res.status === "terkunci") {
                    namaSalesAktifGlobal = res.nama;
                    document.getElementById('panel-login').style.display = 'none';
                    document.getElementById('panel-menu-utama').style.display = 'block';
                    document.getElementById('label-user-aktif').innerText = res.nama;
                    muatDataAntrian();
                } else {
                    namaSalesAktifGlobal = "";
                    document.getElementById('panel-login').style.display = 'block';
                    document.getElementById('panel-menu-utama').style.display = 'none';
                    document.getElementById('pilih-sales').value = ""; 
                    muatDataAntrian();
                }
            })
            .catch(err => {
                console.error("Gagal mengecek akun:", err);
                muatDataAntrian();
            });
        }

        function simpanAkunHP() {
            const namaPilih = document.getElementById('pilih-sales').value;
            const deviceId = getDeviceId();
            if(!namaPilih) return tampilkanModal("Perhatian", "Silakan pilih nama Anda!");

            tampilkanModalKonfirmasi("Kunci Perangkat", `Kunci HP ini atas nama (${namaPilih})?`, function() {
                const btnSimpan = document.querySelector('#panel-login button');
                const textAsli = btnSimpan.innerHTML;
                btnSimpan.disabled = true;
                btnSimpan.innerHTML = `<span class="spinner"></span> Menyimpan...`;

                fetch(`${SCRIPT_URL}?aksi=kunciPerangkat&namaSales=${encodeURIComponent(namaPilih)}&deviceId=${encodeURIComponent(deviceId)}`, {
                    method: 'GET',
                    redirect: 'follow'
                })
                .then(res => res.json())
                .then(res => {
                    setTimeout(() => {
                        btnSimpan.disabled = false;
                        btnSimpan.innerHTML = textAsli;
                        
                        if(res.status === "sukses") {
                            namaSalesAktifGlobal = namaPilih;
                            document.getElementById('panel-login').style.display = 'none';
                            document.getElementById('panel-menu-utama').style.display = 'block';
                            document.getElementById('label-user-aktif').innerText = namaPilih;
                            muatDataAntrian();
                            tampilkanModal("Berhasil", `HP terikat untuk: ${namaPilih}`);
                        } else {
                            namaSalesAktifGlobal = ""; 
                            document.getElementById('pilih-sales').value = ""; 
                            document.getElementById('panel-login').style.display = 'block'; 
                            document.getElementById('panel-menu-utama').style.display = 'none'; 
                            
                            tampilkanModal("Akses Ditolak", res.pesan);
                        }
                    }, 400);
                }).catch(() => {
                    btnSimpan.disabled = false;
                    btnSimpan.innerHTML = textAsli;
                    tampilkanModal("Gagal", "Terjadi gangguan jaringan saat mengunci perangkat.");
                });
            });
        }

        function getAkunAktif() {
            return namaSalesAktifGlobal;
        }

        function hitungMundurLokal() {
            const labelTimer = document.getElementById('label-timer-mundur');
            if (!waktuTerakhirStandbyGlobal) { labelTimer.style.display = 'none'; return; }
            const waktuLokalServer = new Date(waktuTerakhirStandbyGlobal).getTime();
            if (isNaN(waktuLokalServer)) { labelTimer.style.display = 'none'; return; }
            const selisihMs = new Date().getTime() - waktuLokalServer;
            const sisaMs = (BATAS_MENIT * 60 * 1000) - selisihMs;

            if (sisaMs > 0) {
                const totalDetik = Math.floor(sisaMs / 1000);
                const menit = Math.floor(totalDetik / 60);
                const detik = totalDetik % 60;
                labelTimer.style.display = 'block';
                labelTimer.innerText = `Sisa Waktu Standby: ${menit}:${detik < 10 ? '0' : ''}${detik}`;
            } else {
                labelTimer.style.display = 'block';
                labelTimer.innerText = `Waktu Standby Habis!`;
            }
        }

        function prosesCekPeringatanStandby(response, namaPromotorLogin) {
            if (response.data && response.data.length > 0) {
                let listStandby = response.data.filter(item => item.status === "Standby");
                if (listStandby.length > 0) {
                    var promotorUrutan1 = listStandby[0].nama;
                    var sisaDetik = response.sisaDetik;
                    if (promotorUrutan1 === namaPromotorLogin) {
                        if (sisaDetik !== null && sisaDetik <= 60 && sisaDetik > 0 && !sudahPeringatan1Menit) {
                            sudahPeringatan1Menit = true;
                            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500, 200, 500]);
                            tampilkanModal("⚠️ PERINGATAN STANDBY!", "Waktu standby tinggal 1 menit lagi! Hubungi SPV.");
                        }
                        if (sisaDetik > 60) sudahPeringatan1Menit = false;
                    }
                }
            }
        }

        function muatMasterSales() {
            fetch(`${SCRIPT_URL}?aksi=getMasterSales`, {
                method: 'GET',
                redirect: 'follow'
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "sukses") {
                    masterSalesGlobal = res.data || [];
                    let html = '<option value="">-- Pilih Nama Anda --</option>';
                    masterSalesGlobal.forEach(n => html += `<option value="${n}">${n}</option>`);
                    document.getElementById('pilih-sales').innerHTML = html;
                }
            }).catch(err => console.error("Gagal muat master sales"));
        }

        function renderUIRental(dataAntrian, statusSistem, waktuStandbyPertama) {
            daftarAntrianGlobal = dataAntrian || [];
            statusSistemGlobal = statusSistem || "BUKA";
            waktuTerakhirStandbyGlobal = waktuStandbyPertama || null;
            const akunSaya = getAkunAktif().trim();

            const badge = document.getElementById('badge-status-sistem');
            badge.innerText = statusSistemGlobal === "BUKA" ? "STATUS ANTRIAN: OPEN" : "STATUS ANTRIAN: CLOSED";
            badge.className = statusSistemGlobal === "BUKA" ? "status-badge-sistem status-open" : "status-badge-sistem status-closed";

            let listHtml = "";
            let salesUtama = "Belum ada antrian";
            statusSayaGlobal = "belum_ada"; 
            let apakahSayaUrutanPertama = false;

            let listStandby = daftarAntrianGlobal.filter(item => item.status === "Standby");
            if (listStandby.length > 0) {
                salesUtama = listStandby[0].nama;
                if (akunSaya && listStandby[0].nama.trim().toLowerCase() === akunSaya.toLowerCase()) {
                    apakahSayaUrutanPertama = true;
                }
            }

            if(daftarAntrianGlobal.length > 0) {
                let nomorUrut = 1;
                daftarAntrianGlobal.forEach((item) => {
                    const namaItem = String(item.nama).trim();

                    if(akunSaya && namaItem.toLowerCase() === akunSaya.toLowerCase()) {
                        statusSayaGlobal = item.status; 
                    }

                    if (item.status === "Standby") {
                        listHtml += `<li><b>${nomorUrut}. ${item.nama}</b> <span class="badge-status-item badge-standby">Standby</span></li>`;
                        nomorUrut++;
                    } else if (item.status === "Melayani") {
                        listHtml += `<li><b>${item.nama}</b> <span class="badge-status-item badge-melayani">Melayani</span></li>`;
                    }
                });
            } else {
                listHtml = "<li><span>Belum ada promotor aktif</span></li>";
            }

            const btnAntri = document.getElementById('btn-utama-antri');
            const btnCustomer = document.getElementById('btn-utama-customer');

            if (btnAntri.dataset.loading === "true" || btnCustomer.dataset.loading === "true") {
                document.getElementById('nama-aktif').innerText = salesUtama;
                document.getElementById('item-antrian-list').innerHTML = listHtml;
                return;
            }

            if (statusSayaGlobal === "Melayani") {
                btnAntri.innerText = "Sedang Melayani Customer";
                btnAntri.className = "btn-warning btn-disabled";
                btnAntri.disabled = true;

                btnCustomer.style.display = "block";
                btnCustomer.innerText = "SELESAI PELAYANAN";
                btnCustomer.className = "btn-danger";
                btnCustomer.disabled = false;

            } else if (statusSayaGlobal === "Standby") {
                btnAntri.innerText = "Anda Sudah Di Antrian";
                btnAntri.className = "btn-success btn-disabled";
                btnAntri.disabled = true;

                btnCustomer.style.display = "block";
                btnCustomer.innerText = "Sudah Membawa Customer";
                btnCustomer.disabled = !apakahSayaUrutanPertama;
                btnCustomer.className = apakahSayaUrutanPertama ? "btn-primary" : "btn-primary btn-disabled";

            } else { 
                if (statusSistemGlobal === "TUTUP") {
                    btnAntri.innerText = "Antrian Ditutup Oleh SPV";
                    btnAntri.className = "btn-danger btn-disabled";
                    btnAntri.disabled = true;
                } else {
                    btnAntri.innerText = "Masuk Shift / Ikut Antri";
                    btnAntri.className = "btn-success";
                    btnAntri.disabled = false;
                }
                btnCustomer.style.display = "none";
            }

            document.getElementById('nama-aktif').innerText = salesUtama;
            document.getElementById('item-antrian-list').innerHTML = listHtml;
        }

        function muatDataAntrian() {
            const btnAntri = document.getElementById('btn-utama-antri');
            const btnCustomer = document.getElementById('btn-utama-customer');
            if ((btnAntri && btnAntri.dataset.loading === "true") || (btnCustomer && btnCustomer.dataset.loading === "true")) {
                return;
            }

            fetch(`${SCRIPT_URL}?aksi=getAntrian`, {
                method: 'GET',
                redirect: 'follow'
            })
            .then(res => res.json())
            .then(res => {
                if(res && res.status === "sukses") {
                    const akunSaya = getAkunAktif().trim();
                    prosesCekPeringatanStandby(res, akunSaya);
                    renderUIRental(res.data, res.statusAntrian, res.waktuStandbyPertama);
                }
            }).catch(err => {
                console.log("Menunggu sinkronisasi server...");
            });
        }

        function aksiUtamaAntri() {
            const namaSales = getAkunAktif();
            if(!namaSales) return tampilkanModal("Perhatian", "Akun belum terikat.");
            
            const btnAntri = document.getElementById('btn-utama-antri');
            btnAntri.dataset.loading = "true";
            btnAntri.disabled = true;
            btnAntri.innerHTML = `<span class="spinner"></span> Memproses...`;

            statusSayaGlobal = "Standby";
            let tempSembuhList = [...daftarAntrianGlobal];
            if(!tempSembuhList.some(x => x.nama.toLowerCase() === namaSales.toLowerCase())) {
                tempSembuhList.push({ nama: namaSales, status: "Standby" });
            }
            renderUIRental(tempSembuhList, statusSistemGlobal, waktuTerakhirStandbyGlobal);

            fetch(`${SCRIPT_URL}?aksi=daftarAntri&namaSales=${encodeURIComponent(namaSales)}`, {
                method: 'GET',
                redirect: 'follow'
            })
            .then(res => res.json())
            .then(res => {
                setTimeout(() => {
                    btnAntri.dataset.loading = "false";
                    tampilkanModal("Informasi Shift", res.pesan || "Berhasil diproses");
                    muatDataAntrian();
                }, 500);
            })
            .catch(err => {
                setTimeout(() => {
                    btnAntri.dataset.loading = "false";
                    muatDataAntrian();
                }, 500);
            });
        }

        function aksiUtamaCustomer() {
            const namaSales = getAkunAktif();
            if(!namaSales) return;

            const btnCustomer = document.getElementById('btn-utama-customer');

            if (statusSayaGlobal === "Standby") {
                tampilkanModalKonfirmasi("Konfirmasi", `Sudah membawa customer?`, function() {
                    btnCustomer.dataset.loading = "true";
                    btnCustomer.disabled = true;
                    btnCustomer.innerHTML = `<span class="spinner"></span> Memproses...`;
                    
                    statusSayaGlobal = "Melayani";
                    renderUIRental(daftarAntrianGlobal, statusSistemGlobal, waktuTerakhirStandbyGlobal);

                    fetch(`${SCRIPT_URL}?aksi=ambilAntrian&namaSales=${encodeURIComponent(namaSales)}`, {
                        method: 'GET',
                        redirect: 'follow'
                    })
                    .then(res => res.json())
                    .then(res => {
                        setTimeout(() => {
                            btnCustomer.dataset.loading = "false";
                            tampilkanModal("Status Antrian", res.pesan || "Berhasil diproses");
                            muatDataAntrian();
                        }, 500);
                    })
                    .catch(err => {
                        setTimeout(() => {
                            btnCustomer.dataset.loading = "false";
                            muatDataAntrian();
                        }, 500);
                    });
                });
            } else if (statusSayaGlobal === "Melayani") {
                tampilkanModalKonfirmasi("Selesai Pelayanan", `Apakah Anda sudah selesai melayani customer?`, function() {
                    btnCustomer.dataset.loading = "true";
                    btnCustomer.disabled = true;
                    btnCustomer.innerHTML = `<span class="spinner"></span> Memproses...`;
                    
                    statusSayaGlobal = "belum_ada";
                    renderUIRental(daftarAntrianGlobal.filter(x => x.nama.toLowerCase() !== namaSales.toLowerCase()), statusSistemGlobal, waktuTerakhirStandbyGlobal);

                    fetch(`${SCRIPT_URL}?aksi=selesaiMelayani&namaSales=${encodeURIComponent(namaSales)}`, {
                        method: 'GET',
                        redirect: 'follow'
                    })
                    .then(res => res.json())
                    .then(res => {
                        setTimeout(() => {
                            btnCustomer.dataset.loading = "false";
                            tampilkanModal("Status Antrian", res.pesan || "Berhasil diproses");
                            muatDataAntrian();
                        }, 500);
                    })
                    .catch(err => {
                        setTimeout(() => {
                            btnCustomer.dataset.loading = "false";
                            muatDataAntrian();
                        }, 500);
                    });
                });
            }
        }

        function tampilkanModal(judul, pesan) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = judul;
            document.getElementById('modal-desc').innerHTML = String(pesan).replace(/\n/g, '<br>');
            document.getElementById('modal-actions').innerHTML = `<button type="button" class="btn-primary" onclick="tutupModal()">OK</button>`;
            modal.classList.add('active');
        }

        function tampilkanModalKonfirmasi(judul, pesan, callbackOk) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = judul;
            document.getElementById('modal-desc').innerHTML = pesan;
            document.getElementById('modal-actions').innerHTML = `
                <button type="button" class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button type="button" id="btn-ok-confirm" class="btn-primary">Lanjutkan</button>
            `;
            document.getElementById('btn-ok-confirm').onclick = function() {
                tutupModal();
                if(callbackOk) callbackOk();
            };
            modal.classList.add('active');
        }

        function tutupModal() {
            document.getElementById('custom-modal').classList.remove('active');
        }
    </script>
</body>
</html>
